tests:
  - name: c2sm_clm_r13b03_seaice
    machines:
      - name: balfrin
      - name: santis
    refgen: ['balfrin_cpu_nvidia','balfrin_cpu_nvidia_mixed','santis_cpu_nvhpc']
    tags: ['atm', 'merge2rc','probtest']
    checksuite_modes:
      - balfrin: 'tg'
      - santis: 'bt'
    ensemble_num:
      - balfrin_cpu_nvidia: [1,4,5,7,16,24,30,31,40]
      - balfrin_cpu_nvidia_mixed: [1,3,15,43]
      - santis_cpu_nvhpc: [1,2,9,14,19,25,31,35,44]
    tolerance_factor:
      - balfrin: 5
      - santis: 5
