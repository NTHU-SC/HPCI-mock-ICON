tests:
  - name: mch_ch_r04b09_dace
    tags: ['atm','merge2rc','probtest']
    machines:
      - name: balfrin
        include_only: ['balfrin_cpu_nvidia', 'balfrin_gpu_nvidia']
    refgen: ['balfrin_cpu_nvidia']
    checksuite_modes:
      - balfrin: 't'
    ensemble_num:
      - balfrin_cpu_nvidia: [25,12,13,20,19]
    tolerance_factor:
      - balfrin: 5
