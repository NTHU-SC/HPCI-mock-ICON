tests:
  - name: dwd_run_ICON_09_R2B4N5_EPS
    machines:
      - name: horeka
        include_only: ['horeka_cpu_nvhpc','horeka_gpu_nvhpc']
      - name: santis
    refgen: ['horeka_cpu_nvhpc','santis_cpu_nvhpc']
    tags: ['merge2rc','probtest']
    checksuite_modes:
      - horeka: 't'
      - santis: 't'
    ensemble_num:
      - horeka_cpu_nvhpc: [1,2,3,4,7,11,22,25,32,33,36,40,43,47]
      - santis_cpu_nvhpc: [1,2,3,4,5,7,12,15,28,29,41,43,45]
    tolerance_factor:
      - horeka: 11
      - santis: 10
