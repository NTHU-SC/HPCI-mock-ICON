  <body>
    <div id="tableContainer"></div>
    <script>
      // Function to create a table from the parsed YAML data
      function createTable(data, header_mapping) {
          if (!Array.isArray(data)) {
              console.error('YAML data is not an array of objects');
              return;
          }

          const keys = [...new Set(data.flatMap(Object.keys))];
          let tableHTML = '<table id="myTable" class="styled-table"><thead><tr>';

          // Create table header
          keys.forEach(key => {
              tableHTML += `<th>${header_mapping[key] || key}</th>`;
          });
          tableHTML += '</tr></thead>';

          // Create table rows
          const prekey  = { url : '<a class="styled-link" " href="' };
          const postkey = { url : '"></a>' };
          data.forEach(item => {
              tableHTML += '<tr>';
              keys.forEach(key => {
                  tableHTML += `<td>${prekey[key] || ''}${item[key] || ''}${postkey[key] || ''}</td>`;
              });
              tableHTML += '</tr>';
          });

          tableHTML += '</table>';
          document.getElementById('tableContainer').innerHTML = tableHTML;
      }

      function setupTable() {
          createTable(data, title_names);

          //  // fetch and parse the YAML file
          //  // (variant when no CORS restriction applies:)
          //  fetch('data.yaml')
          //      .then(response => response.text())
          //      .then(text => {
          //          const data = jsyaml.load(text);
          //          createTable(data);
          //      })
          //      .catch(error => console.error('Error loading YAML file:', error));

          document.addEventListener('DOMContentLoaded', function() {
              const table = document.getElementById('myTable');
              const headers = table.querySelectorAll('thead th');
              const tbody = table.querySelector('tbody');

              headers.forEach(header => {
                  header.addEventListener('click', () => {
                      const column = header.cellIndex;
                      const rows = Array.from(tbody.querySelectorAll('tr'));

                      const isAscending = header.classList.contains('sorted-asc');

                      rows.sort((a, b) => {
                          const aValue = a.cells[column].textContent.trim();
                          const bValue = b.cells[column].textContent.trim();
                          return isAscending
                              ? bValue.localeCompare(aValue, undefined, {numeric: true, sensitivity: 'base'})
                              : aValue.localeCompare(bValue, undefined, {numeric: true, sensitivity: 'base'});
                      });

                      headers.forEach(h => h.classList.remove('sorted-asc', 'sorted-desc'));
                      header.classList.toggle('sorted-asc', !isAscending);
                      header.classList.toggle('sorted-desc', isAscending);

                      tbody.append(...rows);
                  });
              });
          });
      }

      setupTable(); // function to create a table from the parsed YAML data
    </script>
